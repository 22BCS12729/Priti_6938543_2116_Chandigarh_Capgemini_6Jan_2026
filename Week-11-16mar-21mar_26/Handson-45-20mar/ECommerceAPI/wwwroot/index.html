<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            padding-top: 20px;
        }

            .sidebar h4 {
                text-align: center;
                margin-bottom: 30px;
            }

            .sidebar a {
                display: block;
                padding: 12px 20px;
                color: #cbd5e1;
                text-decoration: none;
                transition: 0.3s;
            }

                .sidebar a:hover {
                    background: #334155;
                    color: white;
                }

        /* Main content */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        /* Cards */
        .card-box {
            border-radius: 15px;
            padding: 20px;
            color: white;
            text-align: center;
        }

        .products {
            background: #22c55e;
        }

        .customers {
            background: #f59e0b;
        }

        .orders {
            background: #ef4444;
        }

        /* Data Box */
        .data-box {
            margin-top: 30px;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
        }

        table {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h4>🛒 Admin</h4>

        <a href="#" onclick="showHome()"><i class="bi bi-house"></i> Dashboard</a>
        <a href="#" onclick="loadProducts()"><i class="bi bi-box"></i> Products</a>
        <a href="#" onclick="loadCustomers()"><i class="bi bi-people"></i> Customers</a>
        <a href="#" onclick="loadOrders()"><i class="bi bi-cart"></i> Orders</a>
        <a href="/swagger"><i class="bi bi-gear"></i> Swagger</a>
    </div>

    <!-- Main Content -->
    <div class="main">

        <h2>🚀 Dashboard</h2>
        <p>Welcome to your admin panel</p>

        <!-- Cards -->
        <div class="row">
            <div class="col-md-4">
                <div class="card-box products">
                    <h4>Products</h4>
                    <button class="btn btn-light" onclick="loadProducts()">View</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-box customers">
                    <h4>Customers</h4>
                    <button class="btn btn-dark" onclick="loadCustomers()">View</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-box orders">
                    <h4>Orders</h4>
                    <button class="btn btn-light" onclick="loadOrders()">View</button>
                </div>
            </div>
        </div>

        <!-- DATA AREA -->
        <div id="dataContainer" class="data-box">
            <h4>📊 Click menu or card to load data</h4>
        </div>

    </div>

    <!-- JS -->
    <script>
        function showHome() {
            document.getElementById("dataContainer").innerHTML =
                "<h4>📊 Dashboard Home</h4><p>Select from sidebar</p>";
        }

        async function loadProducts() {
            const res = await fetch('/api/Product');
            const data = await res.json();

            let html = "<h3>📦 Products</h3><table class='table'><tr><th>ID</th><th>Name</th><th>Price</th><th>Category</th></tr>";

            data.forEach(p => {
                html += `<tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>${p.price}</td>
                <td>${p.category}</td>
            </tr>`;
            });

            html += "</table>";
            document.getElementById("dataContainer").innerHTML = html;
        }

        async function loadCustomers() {
            const res = await fetch('/api/Customer');
            const data = await res.json();

            let html = "<h3>👥 Customers</h3><table class='table'><tr><th>ID</th><th>Name</th><th>Email</th></tr>";

            data.forEach(c => {
                html += `<tr>
                <td>${c.id}</td>
                <td>${c.name}</td>
                <td>${c.email}</td>
            </tr>`;
            });

            html += "</table>";
            document.getElementById("dataContainer").innerHTML = html;
        }

        async function loadOrders() {
            const res = await fetch('/api/Order');
            const data = await res.json();

            let html = "<h3>🛒 Orders</h3><table class='table'><tr><th>ID</th><th>Date</th><th>CustomerId</th><th>ProductId</th></tr>";

            data.forEach(o => {
                html += `<tr>
                <td>${o.id}</td>
                <td>${o.orderDate}</td>
                <td>${o.customerId}</td>
                <td>${o.productId}</td>
            </tr>`;
            });

            html += "</table>";
            document.getElementById("dataContainer").innerHTML = html;
        }
    </script>

</body>
</html>
